<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#FF6B35">
  <title>Ipea · 点亮身边的好活动</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --primary: #FF6B35;
      --primary-light: #FFF0E8;
      --gold: #FFB020;
      --gold-glow: rgba(255, 176, 32, 0.45);
      --bg: #FAFAF8;
      --card: #fff;
      --text: #1A1A2E;
      --muted: #7B8294;
      --border: #E4E7EF;
      --radius: 14px;
    }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: #E8EAED;
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
    }
    .placeholder {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      background: var(--bg);
    }
    .logo {
      font-size: 36px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .logo span { color: var(--gold); }
    .tagline {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .status {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      max-width: 320px;
      box-shadow: 0 2px 10px rgba(0,0,0,.05);
    }
    .status h2 {
      font-size: 15px;
      margin-bottom: 12px;
      color: var(--text);
    }
    .status p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }
    .status a {
      color: var(--primary);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="placeholder">
    <div class="logo">I<span>pea</span></div>
    <p class="tagline">I have a Ipea · 点亮身边的好活动</p>
    <div class="status">
      <h2>🚧 Demo 开发中</h2>
      <p>广州地图活动发现原型正在搭建。详细计划见仓库内 <a href="./PLAN.md">PLAN.md</a>。</p>
    </div>
  </div>
</body>
</html>
