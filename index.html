<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      var repo = '/ipea-demo';
      var path = location.pathname;
      var base = location.origin;
      if (path === repo || path.indexOf(repo + '/') === 0) {
        base += repo + '/';
      } else if (path.endsWith('/')) {
        base += path;
      } else {
        var slash = path.lastIndexOf('/');
        base += slash > 0 ? path.slice(0, slash + 1) : '/';
      }
      document.write('<base href="' + base + '">');
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#FF6B35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Ipea · 点亮身边的好活动</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div id="app">
    <!-- 顶栏 -->
    <header class="header">
      <div class="logo">I<em>pea</em></div>
      <div class="header-actions">
        <button type="button" class="btn-chip" id="btnFilter">
          <span>筛选</span>
        </button>
      </div>
    </header>

    <!-- 地图面板 -->
    <div class="map-panel" id="mapPanel">
      <div class="map-wrap">
        <div class="map-hint">双指缩放 · 拖动地图 · 点击标记</div>
        <div class="filter-bar" id="filterBar" hidden>
          <span id="filterBarText"></span>
          <button type="button" class="filter-bar-clear" id="btnClearFilter">清除筛选</button>
        </div>
        <div class="map-count" id="mapCount"></div>

        <div class="map-canvas" id="mapCanvas">
          <div class="map-content">
            <img class="map-img" src="./assets/map-guangzhou.png" alt="广州地图" draggable="false" width="926" height="755">
            <div class="markers-layer" id="markersLayer"></div>
            <div class="user-loc">
              <div class="user-loc-pulse"></div>
              <div class="user-loc-dot"></div>
            </div>
          </div>
        </div>

        <div class="map-controls">
          <button type="button" class="map-ctrl-btn" id="btnZoomIn" title="放大">+</button>
          <button type="button" class="map-ctrl-btn" id="btnZoomOut" title="缩小">−</button>
          <button type="button" class="map-ctrl-btn" id="btnLocate" title="回到当前位置">◎</button>
        </div>
      </div>
    </div>

    <!-- 推荐列表 -->
    <div class="recommend-panel" id="recommendPanel">
      <div class="recommend-header">
        <h2>下午好，为你推荐附近的好活动</h2>
        <p>基于你的位置与热门活动</p>
      </div>
      <div class="recommend-list" id="recommendList"></div>
    </div>

    <!-- 我的 -->
    <div class="profile-panel" id="profilePanel">
      <div class="profile-header">
        <div class="profile-avatar" id="profileAvatar">👤</div>
        <div class="profile-info">
          <h2 id="profileName">未登录</h2>
          <p id="profileSub">登录后可同步想去清单与评价</p>
        </div>
        <button type="button" class="btn btn-primary btn-sm" id="btnProfileLogin">登录</button>
      </div>
      <div class="profile-segments" id="profileSegments">
        <button type="button" class="profile-seg active" data-seg="want">想去 <span id="profileWantCount">0</span></button>
        <button type="button" class="profile-seg" data-seg="joined">我的活动 <span id="profileJoinedCount">0</span></button>
        <button type="button" class="profile-seg" data-seg="reviews">我的评价 <span id="profileReviewCount">0</span></button>
      </div>
      <div class="profile-scroll" id="profileScroll"></div>
    </div>

    <!-- 筛选面板 -->
    <div class="filter-backdrop" id="filterBackdrop"></div>
    <div class="filter-panel" id="filterPanel">
      <div class="filter-handle"></div>
      <div class="filter-head">
        <h3>筛选活动</h3>
        <button type="button" class="filter-close" id="btnFilterClose">✕</button>
      </div>
      <p class="filter-section-label">类别（多选）</p>
      <div class="filter-chips" id="filterChips"></div>
      <div class="filter-actions">
        <button type="button" class="btn btn-ghost" id="btnFilterReset">重置</button>
        <button type="button" class="btn btn-primary" id="btnFilterApply">查看结果</button>
      </div>
    </div>

    <!-- 活动详情页 -->
    <div class="detail-page" id="detailPage" hidden>
      <div class="detail-nav">
        <button type="button" class="detail-back" id="btnDetailBack">←</button>
        <span>活动详情</span>
        <span class="detail-nav-spacer"></span>
      </div>
      <div class="detail-scroll" id="detailScroll">
        <div class="detail-hero" id="detailHero"></div>
        <div class="detail-body">
          <div class="detail-title-row">
            <h1 class="detail-title" id="detailTitle"></h1>
            <span class="detail-status" id="detailStatus"></span>
          </div>
          <p class="detail-organizer" id="detailOrganizer"></p>
          <div class="detail-rating-block">
            <span class="detail-rating-big" id="detailRatingBig"></span>
            <div class="detail-rating-side">
              <div id="detailStars"></div>
              <span class="detail-review-total" id="detailReviewTotal"></span>
            </div>
          </div>
          <div class="detail-info-card">
            <div class="detail-info-row">
              <span class="detail-info-icon">🕐</span>
              <span id="detailTime"></span>
            </div>
            <div class="detail-info-row">
              <span class="detail-info-icon">📍</span>
              <span id="detailAddress"></span>
              <button type="button" class="detail-nav-btn" id="btnNav">导航</button>
            </div>
          </div>
          <h3 class="detail-section-title">活动介绍</h3>
          <p class="detail-desc" id="detailDesc"></p>
          <div class="detail-action-card" id="detailActionCard">
            <button type="button" class="detail-action-btn" id="btnCheckin">
              <span class="detail-action-icon">📍</span>
              <span class="detail-action-text">
                <strong id="btnCheckinLabel">现场打卡</strong>
                <small id="btnCheckinHint">到达活动现场后打卡</small>
              </span>
            </button>
            <button type="button" class="detail-action-btn" id="btnReview">
              <span class="detail-action-icon">✍️</span>
              <span class="detail-action-text">
                <strong id="btnReviewLabel">写评价</strong>
                <small id="btnReviewHint">打卡后可分享体验</small>
              </span>
            </button>
          </div>
          <div class="detail-section-head">
            <h3 class="detail-section-title">用户评价</h3>
            <span class="detail-section-sub" id="detailCommentCount"></span>
          </div>
          <div class="comment-list" id="commentList"></div>
        </div>
      </div>
      <div class="detail-footer">
        <button type="button" class="btn btn-ghost detail-share" id="btnShare">分享</button>
        <button type="button" class="btn btn-primary detail-want" id="btnWant">想去</button>
      </div>
    </div>

    <!-- 遮罩 -->
    <div class="sheet-backdrop" id="sheetBackdrop"></div>

    <!-- 重叠标记选择 -->
    <div class="cluster-sheet" id="clusterSheet">
      <div class="sheet-handle"></div>
      <div class="cluster-head">
        <h3 id="clusterTitle">此区域有多个活动</h3>
        <button type="button" class="filter-close" id="btnClusterClose">✕</button>
      </div>
      <div class="cluster-list" id="clusterList"></div>
    </div>

    <!-- 活动简要卡片 -->
    <div class="activity-sheet" id="activitySheet">
      <div class="sheet-handle"></div>
      <div class="sheet-body">
        <div class="sheet-top">
          <div class="sheet-thumb" id="sheetThumb"></div>
          <div class="sheet-info">
            <h3 class="sheet-title" id="sheetTitle"></h3>
            <p class="sheet-meta">
              <span class="cat" id="sheetCategory"></span>
              · 距您 <span id="sheetDistance"></span>
            </p>
            <p class="sheet-time" id="sheetTime"></p>
            <div class="sheet-rating">
              <span id="sheetStars"></span>
              <span class="rating-num" id="sheetRatingNum"></span>
              <span class="rating-count" id="sheetReviewCount"></span>
            </div>
          </div>
        </div>
        <div class="sheet-actions">
          <button type="button" class="btn btn-primary" id="btnDetail">查看详情</button>
          <button type="button" class="btn btn-ghost" id="btnCloseSheet">关闭</button>
        </div>
      </div>
    </div>

    <!-- 底部 Tab -->
    <nav class="tabbar">
      <button type="button" class="tab active" data-tab="map">
        <span class="tab-icon">🗺️</span>
        <span>地图</span>
      </button>
      <button type="button" class="tab" data-tab="recommend">
        <span class="tab-icon">✨</span>
        <span>推荐</span>
      </button>
      <button type="button" class="tab" data-tab="profile">
        <span class="tab-icon">👤</span>
        <span>我的</span>
      </button>
    </nav>

    <div class="toast" id="toast"></div>

    <!-- Mock 登录 -->
    <div class="modal-backdrop" id="loginBackdrop"></div>
    <div class="login-modal" id="loginModal">
      <div class="login-logo">I<em>pea</em></div>
      <p class="login-desc">登录后可收藏活动、现场打卡与写评价</p>
      <button type="button" class="btn btn-primary login-btn" id="btnMockLogin">微信一键登录（演示）</button>
      <button type="button" class="btn btn-ghost" id="btnLoginCancel">稍后再说</button>
    </div>

    <!-- 写评价 -->
    <div class="modal-backdrop" id="reviewBackdrop"></div>
    <div class="review-sheet" id="reviewSheet">
      <div class="sheet-handle"></div>
      <div class="review-head">
        <h3>写评价</h3>
        <button type="button" class="filter-close" id="btnReviewClose">✕</button>
      </div>
      <p class="review-act-name" id="reviewActName"></p>
      <div class="review-stars-pick" id="reviewStarsPick"></div>
      <textarea class="review-input" id="reviewInput" rows="4" placeholder="分享你的参与体验…"></textarea>
      <button type="button" class="btn btn-primary" id="btnReviewSubmit">发布评价</button>
    </div>

    <!-- 分步引导 -->
    <div class="guide-overlay" id="guideOverlay" hidden>
      <div class="guide-backdrop" id="guideBackdrop"></div>
      <div class="guide-ring" id="guideRing" hidden></div>
      <div class="guide-bubble" id="guideBubble">
        <p class="guide-text" id="guideText"></p>
        <div class="guide-actions">
          <button type="button" class="guide-skip" id="btnGuideSkip">跳过</button>
          <span class="guide-step-num">1 / 6</span>
          <button type="button" class="btn btn-primary btn-sm" id="btnGuideNext">下一步</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/data.js"></script>
  <script src="./js/guide.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
